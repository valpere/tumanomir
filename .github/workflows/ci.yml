name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      # Dogfood smoke test: the deterministic layer must gate its own spec
      # cleanly (see CLAUDE.md "dogfood-смоук"). Builds via the ./cmd/...
      # wildcard rather than the literal ./cmd/tumanomir path — on this
      # runner image, explicit non-wildcard package paths to `go build`/
      # `go run` spuriously failed with "directory not found" even though
      # the same directory resolves fine via `./...` wildcard expansion.
      - run: go build -o ./tumanomir ./cmd/... && ./tumanomir check docs/requirements.md

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v6
        with:
          install-mode: goinstall # build from source with the runner's Go toolchain —
          version: latest         # avoids "targeted Go version > golangci-lint's build Go version"
